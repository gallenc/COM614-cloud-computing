---

# using fixed ip addresses
# to see all network use docker network ls
# to see config use docker network inspect minimal-minion-activemq_N000
# note gateway is 172.20.0.1 
networks:
  N000:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  N001:
    ipam:
      config:
        - subnet: 172.20.2.0/24

volumes:
   
  # vhost:
   conf: {}
   html: {}
   certs: {}
   acme: {}
      
services:
    
  nginx:
    restart: always
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # The vhost volume is only required if you
      # plan to obtain standalone certificates
      # - vhost:/etc/nginx/vhost.d
      - conf:/etc/nginx/conf.d
      - html:/usr/share/nginx/html
      #- certs:/etc/nginx/certs:ro
      - "./container-fs/acme-companion/certs:/etc/nginx/certs:ro"
    labels: 
        # see https://github.com/nginx-proxy/nginx-proxy/blob/main/docs/README.md#network-segregation
        - "com.github.nginx-proxy.nginx-proxy.nginx"
    networks:
      N000:
        ipv4_address: 172.20.0.50

  nginx-gen:
    restart: always
    image: nginxproxy/docker-gen
    container_name: nginx-gen
    volumes:
      - "/var/run/docker.sock:/tmp/docker.sock:ro"
      - "./container-fs/nginx-gen/templates/nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro"
    volumes_from:
      - nginx
    command: -notify-sighup nginx-proxy -watch -wait 5s:30s /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf

  acme-companion:
    restart: always
    image: nginxproxy/acme-companion
    container_name: acme-companion
    volumes_from:
      - nginx
    volumes:
      - "./container-fs/acme-companion/certs:/etc/nginx/certs:rw"
      #- certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEFAULT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}
      - NGINX_DOCKER_GEN_CONTAINER=nginx-gen
      # - ACME_CA_URI=https://acme-v02.api.letsencrypt.org/directory # production
      - ACME_CA_URI=https://acme-staging-v02.api.letsencrypt.org/directory # staging
    networks:
        N000:
          ipv4_address: 172.20.0.55

