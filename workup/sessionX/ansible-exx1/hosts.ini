# Ansible Inventory for IPMI Power Management
# This inventory file defines hosts for IPMI operations

[local]
localhost ansible_connection=local

[procurve_switches]
switch-3000cl ansible_host=192.168.105.100

[ipmi_management]
# IPMI management hosts for blade servers
blade-1-1   ansible_host=192.168.105.101
blade-1-2   ansible_host=192.168.105.102  
blade-1-3   ansible_host=192.168.105.103
blade-1-4   ansible_host=192.168.105.104 
blade-1-5   ansible_host=192.168.105.105 
blade-1-6   ansible_host=192.168.105.106  
blade-1-7   ansible_host=192.168.105.107 
# blade-1-8   ansible_host=192.168.105.108

[ipmi_management:vars]
# Variables for all IPMI management hosts
ipmi_user: ADMIN
ipmi_password: ADMIN
ansible_user=ansible
ansible_password=minad1234

[all:vars]
# Global variables
power_state=on


