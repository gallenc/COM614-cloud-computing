---
# Ansible Playbook for IPMI Power Management (Loop Version)
# Servers: All servers in ipmi_management group
# Purpose: Turn on or off all servers using IPMI protocol via community.general.ipmi_power module
# This version works with all servers defined in inventory and uses loops for cleaner code

- name: IPMI Power Management for All Servers
  hosts: ipmi_management
  gather_facts: no
  vars:
    # Set to 'on' or 'off' to control server power state
    # Power State: 'on', 'off', 'reboot', 'status'
    # Commonly used states:
    #   on              - Power on the server
    #   off             - Power off the server (graceful)
    #   hard_power_off  - Force hard power off
    #   reboot          - Reboot the server
    #   status          - Check power status (informational only)
    power_state: 'on'
    # IPMI credentials (update with actual values or use vault)
    ipmi_user: ADMIN
    ipmi_password: ADMIN
  
  tasks:
    - name: Display IPMI Power Management Task
      debug:
        msg: "Managing IPMI power for {{ inventory_hostname }} - Setting power state to: {{ power_state }}"
        
    - name: Manage IPMI power state via ipmitool
      ansible.builtin.shell: >
        ipmitool -I lanplus 
        -H "{{ ansible_host  }}" 
        -U "{{ ipmi_user }}" 
        -P "{{ ipmi_password }}" 
        chassis power {{ power_state }}
      delegate_to: localhost
      register: ipmi_result

# cant use this module as it needs SSH and wont work with supermicro
#    - name: Manage IPMI power state via ipmitool
#      community.general.ipmi_power:
#        name: "{{ inventory_hostname }}"
#        user: "{{ ipmi_user }}"
#        password: "{{ ipmi_password }}"
#        host: "{{ ansible_host }}"
#        state: "{{ power_state }}"
#      register: ipmi_result
#      when: power_state in ['on', 'off']

    - name: Display IPMI Power Management Result
      debug:
        msg: "Server {{ inventory_hostname }} ({{ ansible_host }}): Result = {{ ipmi_result.stdout}}"
      when: ipmi_result is defined
