[defaults]
# Ansible Configuration for IPMI Power Management Playbooks

# Host key checking (set to False for lab/test environments)
# WARNING: Set to True in production for security
host_key_checking = False

# Inventory settings
inventory = ./hosts.ini

# Connection timeout in seconds
timeout = 30

# Module default settings
# Plugins
collections_paths = ~/.ansible/collections:/usr/share/ansible/collections

# Logging
log_path = ./ansible.log
# Uncomment to enable debug logging (verbose output)
# debug = True

# Force color output
force_color = True

# Gather facts for performance optimization
gather_facts = no

# SSH settings (useful for remote IPMI operations via SSH)
[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
