---

 - debug:
     msg: "conffiguring Pi4 device . Device Type: {{ device_type }}"
          
# this is needed to set wireless as default route after network is up, otherwise the device will use ethernet as default route and wireless won't work until you manually change the default route to wlan0.
 - name: stop and disable PostNetworkUp.service if exists
   ansible.builtin.systemd:
      name: PostNetworkUp.service
      enabled: false
      state: stopped
   ignore_errors: true

 - name: copy content to  /etc/systemd/system/PostNetworkUp.service
   become: true
   copy:
      force: true
      content: |
       [Unit]
       Description=PostNetworkUp service - set wireless as default root
       Wants=network.target network-online.target
       After=network.target network-online.target

       [Service]
       Type=oneshot
       ExecStartPre=/bin/sleep 5
       ExecStart=sudo ifmetric wlan0 50
       StandardOutput=syslog
       StandardError=syslog
       SyslogIdentifier=postNetworkUp

       [Install]
       WantedBy=multi-user.target
          
      dest: /etc/systemd/system/PostNetworkUp.service
      mode: '0644'
      
 - name: Enable and start PostNetworkUp.service
   ansible.builtin.systemd:
      name: PostNetworkUp.service
      enabled: true
      state: started
