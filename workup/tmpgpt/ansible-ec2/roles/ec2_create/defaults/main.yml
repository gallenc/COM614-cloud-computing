---
# ─────────────────────────────────
#  ec2_create role – default values
#  Override via extra-vars or group_vars
# ─────────────────────────────────

# --- Instance identity ---
instance_name: "ansible-managed"
instance_type: "t3.micro"

# Amazon Linux 2023 AMI (us-east-1). Update per region as needed.
# Find the latest: aws ssm get-parameter --name /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
ami_id: "ami-0c02fb55956c7d316"

# --- Quantity ---
instance_count: 1

# --- Networking ---
# Leave blank to use the default VPC / subnet
vpc_subnet_id: ""
security_group_ids: []   # e.g. ["sg-0abc123", "sg-0def456"]
assign_public_ip: true

# --- SSH key pair (must already exist in the target region) ---
key_name: "my-keypair"

# --- Storage ---
root_volume_size_gb: 20         # GiB
root_volume_type: "gp3"
root_volume_delete_on_termination: true

# --- Wait / timeouts ---
wait_for_instance: true
wait_timeout: 300               # seconds
