---

- name: Unlock SSH key "{{ ssh_key_file }}"
  # shell: echo "$(sudo cat {{ ssh_key_file }})" | ssh-add -
  shell: sudo rm -f "/tmp/ansible_add_ssh_run_pid" ; echo "$(sudo cat /home/ansible/.ssh/id_rsa)" | SSH_ASKPASS_REQUIRE=force  SSH_ASKPASS=/share/ssh-pass.sh ssh-add -
  #async: 20
  #poll: 5
  #expect:
  #  command: ssh-add "{{ ssh_key_file }}"
  #  responses:
  #    passphrase: "{{ ssh_key_pass }}"
  delegate_to: 127.0.0.1
  become: false
  changed_when: no
  no_log: false
  run_once: true
  
- name: print key variables
  shell: ssh-add -l
  delegate_to: 127.0.0.1
  become: false
  changed_when: no
  no_log: false
  register: ssh_agent_keys
  
- name: Debug output
  debug:
     msg: "ssh agent keys '{{ ssh_agent_keys.stdout }}'"

