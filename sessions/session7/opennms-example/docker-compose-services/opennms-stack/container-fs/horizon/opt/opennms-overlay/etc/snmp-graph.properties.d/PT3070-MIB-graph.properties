report.pt3070Precorrector.pt3070PrecorrectorPaprClipping.name=PT3070-MIB::pt3070Precorrector::pt3070PrecorrectorPaprClipping
report.pt3070Precorrector.pt3070PrecorrectorPaprClipping.columns=pt3070PrecPaprClipp
report.pt3070Precorrector.pt3070PrecorrectorPaprClipping.type=nodeSnmp
report.pt3070Precorrector.pt3070PrecorrectorPaprClipping.description=set the built-in peak clipper function. The value 'max' corresponds to an unclipped COFDM signal (12dB peak to average ratio). The value 'min' correspondsto COFDM signal where all peaks >2dB above average power are clipped. When feeding the output from the modulator through an amplifier the best overall performance result is normally obtained if the clipper value used by modulator clips the signal just a fraction before the amplifier would clip the signal.
report.pt3070Precorrector.pt3070PrecorrectorPaprClipping.command=--title="PT3070-MIB::pt3070Precorrector::pt3070PrecorrectorPaprClipping" \
 DEF:var={rrd1}:pt3070PrecPaprClipp:AVERAGE \
