 GPRINT:var:AVERAGE:"Avg\\: %8.2lf %s" \
 GPRINT:var:MIN:"Min\\: %8.2lf %s" \
 GPRINT:var:MAX:"Max\\: %8.2lf %s\\n"

report.pt3070Precorrector.pt3070PrecorrectorPaprShaping.name=PT3070-MIB::pt3070Precorrector::pt3070PrecorrectorPaprShaping
report.pt3070Precorrector.pt3070PrecorrectorPaprShaping.columns=pt3070PrecPaprShapi
report.pt3070Precorrector.pt3070PrecorrectorPaprShaping.type=nodeSnmp
report.pt3070Precorrector.pt3070PrecorrectorPaprShaping.description=Set the output peak shaping filter hardness. The value 'min' correspond to traditional 'hard-clipping' where the clipper noise is equally distributed below, inside and above the COFDM spectrum (clipper noise clearly visible in the form of noise above and below the spectrum. The value 'max' corresponds to maximum soft clipping where the clipper noise in the sidebands (above and below the COFDM spectrum) is subjected to maximum suppression while still maintaining the exact clipper value (peak-to-average-ration). The suppression of the sideband noise is obtained as a tradeoff against the in band performance. The clip filter setting is typically selected as a compromise between spectrum shoulder performance and in-band signal performance (MER).
report.pt3070Precorrector.pt3070PrecorrectorPaprShaping.command=--title="PT3070-MIB::pt3070Precorrector::pt3070PrecorrectorPaprShaping" \
 DEF:var={rrd1}:pt3070PrecPaprShapi:AVERAGE \
 LINE1:var#00ccff:"pt3070PrecorrectorPaprShaping" \
 GPRINT:var:AVERAGE:"Avg\\: %8.2lf %s" \
 GPRINT:var:MIN:"Min\\: %8.2lf %s" \
 GPRINT:var:MAX:"Max\\: %8.2lf %s\\n"

