[bastion]
nocinstance1.noc.dev.aws1.interfbn.com ansible_user=ansible

[remote]
minion_pi_widley  ansible_host=localhost ansible_user=ansible ansible_port=9010
minion_pi_lab     ansible_host=localhost ansible_user=ansible ansible_port=9011
minion_nuc_lab    ansible_host=localhost ansible_user=ansible ansible_port=9012

[remote:vars]
ansible_ssh_extra_args=-J ansible@nocinstance1.noc.dev.aws1.interfbn.com

# note this does not need the ansible public key to be added to the bastion host,
# but it does need the private key to be available on the control node and the public key to be added to the remote hosts
# ssh -J ansible@nocinstance1.noc.dev.aws1.interfbn.com ansible@localhost -p 9001

[empty_group]

