---
- name: test load ssh keys with passphrase
  hosts: noc
  # Postpone facts gathering until SSH keys have been unlocked
  gather_facts: false
  become: true
  
  pre_tasks:
    
    - name: Debug output
      debug:
         msg: "running in semaphore. Installing keys"
      when: (lookup('env', 'SEMAPHORE_ADMIN') | length > 0)
  
    - name: install semaphore ansible ssh keys
      import_tasks: tasks/load-ssh-keys.yaml
      when: (lookup('env', 'SEMAPHORE_ADMIN') | length > 0)
      run_once: true

    - name: Gathering facts
      setup:

  tasks:
    
    # work around for permissions issues when running ansible in semaphore with a non-root user and copying files to the ansible controller
    
    - name: compress secrets to gz file
      run_once: true
      ansible.builtin.shell: |
         sudo rm -f /tmp/secretkeys.tar.gz
         sudo tar -czf /tmp/secretkeys.tar.gz /shared-secrets /shared-keys 
         sudo chown ansible:ansible /tmp/secretkeys.tar.gz
         exit 0
      delegate_to: localhost
        
    - name: copy secret keys to remote ansible controller
      become: true
      ansible.builtin.copy:
         src:  /tmp/secretkeys.tar.gz
         dest: /tmp/secretkeys.tar.gz
         force: true

    - name: unpack shared secrets on ansible controller
      become: true
      ansible.builtin.shell: |
          sudo rm -r -f /opt/docker/compose/docker-compose-services/.shared-secrets
          sudo rm -r -f /opt/docker/compose/docker-compose-services/.shared-keys
          
          sudo tar -xvzf /tmp/secretkeys.tar.gz -C /opt/docker/compose/docker-compose-services/
          
          cd /opt/docker/compose/docker-compose-services/
          sudo mv shared-secrets .shared-secrets
          sudo mv shared-keys .shared-keys
          sudo rm -f /tmp/secretkeys.tar.gz
          exit 0

    - name: remove temporary gz file from localhost
      ansible.builtin.shell: |
          sudo rm /tmp/secretkeys.tar.gz
          exit 0
      delegate_to: localhost
      
  post_tasks:

    - name: drop semaphore ansible ssh keys
      import_tasks: tasks/unload-ssh-keys.yaml
      when: (lookup('env', 'SEMAPHORE_ADMIN') | length > 0)
      run_once: true
