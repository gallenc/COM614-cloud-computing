---
    
# set up bastion ssh service

- name: add bastion ssh user and set groups
  ansible.builtin.user:
    name: sshtunnel
    home: "/home/sshtunnel"
    shell: "/bin/bash"
    generate_ssh_key: yes
    ssh_key_bits: 2048
    ssh_key_file: .ssh/id_rsa
  register: user_result

- name: Display generated public key
  ansible.builtin.debug:
     msg: "Public key: {{ user_result.ssh_public_key }}"

- name: remove sshtunnel's password
  ansible.builtin.user:
    name: sshtunnel
    password: "*"
    
- name: ensure local share .ssh folder exists
  connection: local
  become: true
  ansible.builtin.file:
    path: "/share/sshtunnel/.ssh"
    state: directory
    mode: '0777'

- name: Store the public key locally for later distribution
  connection: local
  ansible.builtin.copy:
    content: "{{ user_result.ssh_public_key }}"
    dest: /share/sshtunnel/.ssh/id_rsa.pub.
    mode: '0644'
    
- name: Store the private key locally for later distribution
  connection: local
  ansible.builtin.copy:
    content: "{{ user_result.ssh_key_file }}"
    dest: /share/sshtunnel/.ssh/id_rsa
    mode: '0600'
    
- name: local user login details
  ansible.builtin.debug:
         msg: "ssh -i /share/sshtunnel/.ssh/id_rsa sshtunnel@{{inventory_hostname}} -p 22"
    
- name: test login using the generated private key
  connection: local
  ansible.builtin.command: "ssh -i /share/sshtunnel/.ssh/id_rsa sshtunnel@{{inventory_hostname}} -p 22 echo 'SSH connection successful'"
  register: ssh_test_result
  ignore_errors: true
  
- ansible.builtin.debug:
     msg: "ssh test result {{ ssh_test_result.stdout }}"
